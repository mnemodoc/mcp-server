paths:
  - doc/claude/
  - app/

# exclude:
#   - "**/templates/**"

ollama:
  host: http://localhost:11434
  model: nomic-embed-text
  timeout: 30
  batch_size: 10

search:
  top_k: 5
  mode: hybrid          # hybrid | semantic | keyword
  recency_days: 7
  recency_boost: 0.1    # multiplicative: recent files score ×(1 + boost)
  keyword_weight: 0.3   # weight of keyword vs semantic (1.0) in hybrid fusion
  # backend: vec0       # semantic KNN backend: vec0 (embedded, default) | qdrant (opt-in)

# Opt-in Qdrant backend (required when search.backend: qdrant). SQLite stays the
# source of truth; Qdrant is a best-effort, rebuildable KNN index keyed by chunk id.
# qdrant:
#   url: https://my-qdrant:6333   # Qdrant endpoint (api-key header auth)
#   api_key:                      # optional; or env QDRANT_API_KEY
#   collection:                   # optional; default = project key (basename-hash)

server:
  sse_host: 127.0.0.1 # bind address for SSE; the endpoint is UNAUTHENTICATED — use 0.0.0.0 only to expose it deliberately
  sse_port: 8765
  log_file: stderr    # stderr | stdout | /path/to/file.log
  log_level: info     # trace | debug | info | warn | error | fatal | off
  daemon: true        # false → serve --stdio runs standalone (no per-project background daemon)
  daemon_idle_timeout: 600  # seconds of inactivity before the daemon self-exits (>= 1)

db:
  # default: ~/.local/share/mnemodoc-server/<basename>-<hash>/index.db
  #   (basename + SHA-1 prefix of the config file's directory — each project gets an isolated index)
  # path: /custom/path/to/index.db

index:
  concurrency: 4      # parallel files indexed at once (>= 1)
  pdf: false          # opt-in PDF indexing; requires `pdftotext` in PATH, skips PDFs otherwise

# Chunking noise reduction (both default false → index byte-for-byte unchanged).
# Re-index after changing these (ingest_path / a full re-index) to take effect.
# chunking:
#   strip_link_only_lines: true              # drop pure breadcrumb lines (links + separators only); line-based markup (Markdown/Org/AsciiDoc/RST), no-op on DOM/Office formats
#   merge_preamble_into_first_section: true  # fold the pre-heading preamble into the first section chunk

# Contextual roles (optional): the get_project_context MCP tool and the `context`
# CLI command select which conventions Claude should adopt for the files/task/query
# at hand. Role file paths resolve relative to this config file, like `paths`.
# context:
#   default: doc/claude/roles/generalist.md  # fallback when no rule fires and there is no signal
