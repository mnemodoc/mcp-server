#     - file: doc/claude/roles/backend.md
#       description: Backend conventions — operations, persistence, policies  # used for the semantic tie-break
#       when_files: ["app/models/**", "app/policies/**"]  # glob triggers on the edited file paths
#       when_task:  ["implement", "refactor"]             # substring triggers on the task kind
#       when_query: ["operation", "policy", "persistence"] # substring triggers on the user query
#     - file: doc/claude/roles/frontend.md
